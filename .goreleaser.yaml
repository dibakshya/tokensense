before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: tokensense
    main: ./main.go
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "tokensense_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: tokensense
      name: homebrew-tap
    homepage: https://github.com/tokensense/tokensense
    description: "AI token usage optimizer — local proxy for model cost analysis"
    license: MIT
    install: |
      bin.install "tokensense"

nfpms:
  - id: packages
    package_name: tokensense
    vendor: Tokensense
    license: MIT
    description: AI token usage optimizer
    formats: [deb, rpm]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
